# Blueprint Admin_IC (repo séparé) — site admin statique.
# L’API est sur ingenious-city-api (repo Ingenious_Access / Ingenious_city).
services:
  - type: web
    name: admin-ic
    runtime: static
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Obligatoire : https:// au début (sinon ERR_NAME_NOT_RESOLVED)
      - key: VITE_API_BASE_URL
        value: "https://ingenious-city-api.onrender.com/api"
