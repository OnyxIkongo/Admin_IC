# Site admin statique — repo Admin_IC (à part de ingenious-city-api).
services:
  - type: web
    name: admin-ic
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://ingenious-city-api.onrender.com/api
