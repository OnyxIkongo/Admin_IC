# Blueprint Admin_IC (repo séparé) — site admin statique.
# L’API est sur ingenious-city-api (repo Ingenious_Access / Ingenious_city).
services:
  - type: web
    name: admin-ic
    runtime: static
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    # Si upload timeout : Render → admin-ic → Manual Deploy → Clear build cache & deploy
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # Obligatoire : https:// au début (sinon ERR_NAME_NOT_RESOLVED)
      - key: VITE_API_BASE_URL
        value: "https://ingenious-city-api.onrender.com/api"
